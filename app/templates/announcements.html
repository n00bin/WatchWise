{% extends "base.html" %}
{% block title_suffix %} - News{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">News & Updates</h1>
    <button class="btn btn-primary" id="adminPostBtn" style="display:none" onclick="openPostModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Post Update
    </button>
</div>

<div id="announcementsList">
    <div class="loading-center"><div class="spinner"></div></div>
</div>

<!-- Post Modal (admin only) -->
<div class="modal-overlay" id="postModal" onclick="if(event.target===this)closePostModal()">
    <div class="modal" style="max-width:500px">
        <div class="modal-header">
            <h2>Post Announcement</h2>
            <button class="btn-icon" onclick="closePostModal()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-group" style="margin-bottom:16px">
                <label style="font-size:0.82rem;color:var(--text-muted);display:block;margin-bottom:6px">Type</label>
                <div style="display:flex;gap:6px" id="postTypeBtns">
                    <button class="btn btn-sm" data-type="update" onclick="setPostType('update')" style="background:#7c3aed;color:white;border-color:#7c3aed">Update</button>
                    <button class="btn btn-sm" data-type="feature" onclick="setPostType('feature')" style="background:transparent;color:var(--text-muted);border:1px solid var(--border)">New Feature</button>
                    <button class="btn btn-sm" data-type="fix" onclick="setPostType('fix')" style="background:transparent;color:var(--text-muted);border:1px solid var(--border)">Bug Fix</button>
                    <button class="btn btn-sm" data-type="info" onclick="setPostType('info')" style="background:transparent;color:var(--text-muted);border:1px solid var(--border)">Info</button>
                </div>
            </div>
            <div class="form-group" style="margin-bottom:16px">
                <label style="font-size:0.82rem;color:var(--text-muted);display:block;margin-bottom:6px">Title</label>
                <input type="text" id="postTitle" class="form-input" placeholder="What's new..." maxlength="300">
            </div>
            <div class="form-group" style="margin-bottom:16px">
                <label style="font-size:0.82rem;color:var(--text-muted);display:block;margin-bottom:6px">Message</label>
                <textarea id="postMessage" class="form-input" placeholder="Details..." rows="4" style="resize:vertical;font-family:inherit"></textarea>
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="postAnnouncement()">Publish</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let isAdmin = false;
let postType = 'update';

const TYPE_STYLES = {
    update: { color: '#7c3aed', label: 'Update', icon: '&#9733;' },
    feature: { color: '#10b981', label: 'New Feature', icon: '&#10024;' },
    fix: { color: '#f59e0b', label: 'Bug Fix', icon: '&#128295;' },
    info: { color: '#06b6d4', label: 'Info', icon: '&#8505;' },
};

async function loadPageData() {
    try {
        const [announcements, me] = await Promise.all([
            api('/api/announcements'),
            api('/api/auth/me'),
        ]);
        isAdmin = me.is_admin || false;
        if (isAdmin) document.getElementById('adminPostBtn').style.display = '';
        renderAnnouncements(announcements);

        // Mark all as read
        await api('/api/announcements/mark-read', { method: 'POST' });
        // Update badge in nav
        const badge = document.getElementById('newsBadge');
        if (badge) badge.style.display = 'none';
    } catch (err) {
        document.getElementById('announcementsList').innerHTML = `<p style="color:var(--danger);text-align:center;padding:20px">${err.message}</p>`;
    }
}

function renderAnnouncements(items) {
    const container = document.getElementById('announcementsList');

    if (items.length === 0) {
        container.innerHTML = `
            <div style="text-align:center;padding:40px;color:var(--text-muted)">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <h3>No announcements yet</h3>
                <p style="font-size:0.85rem">Check back later for updates and patch notes.</p>
            </div>
        `;
        return;
    }

    container.innerHTML = items.map(a => {
        const style = TYPE_STYLES[a.type] || TYPE_STYLES.info;
        const date = a.created_at ? new Date(a.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
        const unreadDot = !a.is_read ? `<span style="display:inline-block;width:8px;height:8px;background:var(--primary);border-radius:50%;margin-right:8px"></span>` : '';

        return `
            <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;${!a.is_read ? 'border-left:3px solid var(--primary)' : ''}">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
                    ${unreadDot}
                    <span style="font-size:0.7rem;font-weight:600;color:white;background:${style.color};padding:2px 8px;border-radius:4px;text-transform:uppercase">${style.label}</span>
                    <span style="font-size:0.78rem;color:var(--text-dim)">${date}</span>
                    ${isAdmin ? `<button onclick="deleteAnnouncement(${a.id})" style="margin-left:auto;font-size:0.7rem;padding:2px 8px;background:none;color:var(--danger);border:1px solid rgba(239,68,68,0.3);border-radius:4px;cursor:pointer;font-family:inherit">Delete</button>` : ''}
                </div>
                <div style="font-weight:600;font-size:1rem;color:var(--text);margin-bottom:6px">${escapeHtml(a.title)}</div>
                ${a.message ? `<div style="font-size:0.85rem;color:var(--text-muted);line-height:1.6;white-space:pre-line">${escapeHtml(a.message)}</div>` : ''}
            </div>
        `;
    }).join('');
}

function openPostModal() {
    document.getElementById('postModal').classList.add('open');
    document.getElementById('postTitle').value = '';
    document.getElementById('postMessage').value = '';
    setPostType('update');
    setTimeout(() => document.getElementById('postTitle').focus(), 100);
}

function closePostModal() {
    document.getElementById('postModal').classList.remove('open');
}

function setPostType(type) {
    postType = type;
    const colors = { update: '#7c3aed', feature: '#10b981', fix: '#f59e0b', info: '#06b6d4' };
    document.querySelectorAll('#postTypeBtns .btn').forEach(b => {
        const isActive = b.dataset.type === type;
        const color = colors[b.dataset.type] || '#7c3aed';
        b.style.background = isActive ? color : 'transparent';
        b.style.color = isActive ? 'white' : 'var(--text-muted)';
        b.style.borderColor = isActive ? color : 'var(--border)';
    });
}

async function postAnnouncement() {
    const title = document.getElementById('postTitle').value.trim();
    const message = document.getElementById('postMessage').value.trim();

    if (!title) {
        showToast('Please enter a title', 'error');
        return;
    }

    try {
        await api('/api/announcements', {
            method: 'POST',
            body: { title, message, type: postType },
        });
        showToast('Announcement published!', 'success');
        closePostModal();
        loadPageData();
    } catch (err) {
        showToast(`Error: ${err.message}`, 'error');
    }
}

async function deleteAnnouncement(id) {
    if (!confirm('Delete this announcement?')) return;
    try {
        await api(`/api/announcements/${id}`, { method: 'DELETE' });
        loadPageData();
        showToast('Deleted', 'success');
    } catch (err) {
        showToast(`Error: ${err.message}`, 'error');
    }
}

loadPageData();
</script>
{% endblock %}
