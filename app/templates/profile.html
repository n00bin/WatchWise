<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchWise - {{ username }}'s Profile</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#7c3aed">
    <meta property="og:title" content="{{ username }}'s WatchWise Profile">
    <meta property="og:description" content="Check out what {{ username }} is watching and their top-rated picks on WatchWise.">
    <meta property="og:type" content="profile">
    <style>
        body { padding: 0; }
        .profile-page { max-width: 800px; margin: 0 auto; padding: 32px 20px; }
        .profile-header {
            display: flex; align-items: center; gap: 20px; margin-bottom: 32px;
            padding-bottom: 24px; border-bottom: 1px solid var(--border);
        }
        .profile-avatar {
            width: 72px; height: 72px; border-radius: 50%; background: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 700; color: white; flex-shrink: 0;
        }
        .profile-name { font-size: 1.5rem; font-weight: 700; color: var(--text); }
        .profile-meta { font-size: 0.82rem; color: var(--text-muted); margin-top: 4px; }
        .profile-stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px; margin-bottom: 32px;
        }
        .profile-stat {
            background: var(--card); border: 1px solid var(--border); border-radius: 10px;
            padding: 16px; text-align: center;
        }
        .profile-stat-value { font-size: 1.3rem; font-weight: 700; color: var(--text); }
        .profile-stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
        .profile-section { margin-bottom: 28px; }
        .profile-section h3 { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 12px; }
        .profile-row {
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px;
        }
        .profile-card {
            flex-shrink: 0; width: 110px; text-align: center;
        }
        .profile-card-poster {
            width: 110px; height: 160px; border-radius: 8px; overflow: hidden;
            background: var(--bg); margin-bottom: 6px; position: relative;
        }
        .profile-card-poster img { width: 100%; height: 100%; object-fit: cover; }
        .profile-card-rating {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 4px 6px;
            color: #f59e0b; font-size: 0.75rem; font-weight: 600;
        }
        .profile-card-title {
            font-size: 0.75rem; font-weight: 500; color: var(--text);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .profile-card-year { font-size: 0.7rem; color: var(--text-dim); }
        .profile-genres { display: flex; flex-wrap: wrap; gap: 6px; }
        .profile-genre-tag {
            font-size: 0.75rem; padding: 4px 10px; border-radius: 20px;
            background: rgba(124,58,237,0.15); color: var(--primary-light); font-weight: 500;
        }
        .profile-cta {
            text-align: center; margin-top: 40px; padding-top: 24px;
            border-top: 1px solid var(--border);
        }
        .profile-cta p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; }
        .profile-cta a {
            display: inline-block; padding: 10px 24px; background: var(--primary);
            color: white; border-radius: 8px; text-decoration: none; font-weight: 600;
            font-size: 0.9rem;
        }
        .profile-cta a:hover { background: var(--primary-light); }
        .profile-error { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="profile-page">
        <div id="profileContent">
            <div class="loading-center"><div class="spinner"></div></div>
        </div>
    </div>

    <script>
    async function loadProfile() {
        const username = '{{ username }}';
        try {
            const resp = await fetch(`/api/profile/${username}`);
            if (!resp.ok) {
                document.getElementById('profileContent').innerHTML = `
                    <div class="profile-error">
                        <h2>User not found</h2>
                        <p>No WatchWise user with that username exists.</p>
                        <a href="/login" style="color:var(--primary-light)">Join WatchWise</a>
                    </div>
                `;
                return;
            }
            const data = await resp.json();
            renderProfile(data);
        } catch (err) {
            document.getElementById('profileContent').innerHTML = `<div class="profile-error"><h2>Error loading profile</h2></div>`;
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function renderPosterRow(items, posterKey) {
        if (!items || items.length === 0) return '<p style="font-size:0.82rem;color:var(--text-dim)">Nothing rated yet</p>';
        return `<div class="profile-row">
            ${items.map(item => {
                const poster = item[posterKey] || '';
                return `
                    <div class="profile-card">
                        <div class="profile-card-poster">
                            ${poster ? `<img src="${poster}" alt="" loading="lazy">` : '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:0.7rem">No Poster</div>'}
                            <div class="profile-card-rating">${item.rating}/5 &#9733;</div>
                        </div>
                        <div class="profile-card-title" title="${escapeHtml(item.title)}">${escapeHtml(item.title)}</div>
                        ${item.year ? `<div class="profile-card-year">${item.year}</div>` : ''}
                    </div>
                `;
            }).join('')}
        </div>`;
    }

    function renderProfile(d) {
        let html = `
            <div class="profile-header">
                <div class="profile-avatar">${d.username.charAt(0).toUpperCase()}</div>
                <div>
                    <div class="profile-name">${escapeHtml(d.username)}</div>
                    <div class="profile-meta">Member since ${d.joined} &bull; ${d.total_rated} ratings &bull; Avg ${d.avg_rating}/5</div>
                </div>
            </div>

            <div class="profile-stats">
                <div class="profile-stat">
                    <div class="profile-stat-value">${d.watched_movies}</div>
                    <div class="profile-stat-label">Movies</div>
                </div>
                <div class="profile-stat">
                    <div class="profile-stat-value">${d.watched_tvshows}</div>
                    <div class="profile-stat-label">TV Shows</div>
                </div>
                <div class="profile-stat">
                    <div class="profile-stat-value">${d.completed_anime}</div>
                    <div class="profile-stat-label">Anime</div>
                </div>
                <div class="profile-stat">
                    <div class="profile-stat-value">${d.avg_rating}/5</div>
                    <div class="profile-stat-label">Avg Rating</div>
                </div>
            </div>
        `;

        if (d.top_genres && d.top_genres.length > 0) {
            html += `
                <div class="profile-section">
                    <h3>Favorite Genres</h3>
                    <div class="profile-genres">
                        ${d.top_genres.map(([name, count]) => `<span class="profile-genre-tag">${escapeHtml(name)} (${count})</span>`).join('')}
                    </div>
                </div>
            `;
        }

        if (d.top_movies && d.top_movies.length > 0) {
            html += `
                <div class="profile-section">
                    <h3>Top Rated Movies</h3>
                    ${renderPosterRow(d.top_movies, 'poster_path')}
                </div>
            `;
        }

        if (d.top_tvshows && d.top_tvshows.length > 0) {
            html += `
                <div class="profile-section">
                    <h3>Top Rated TV Shows</h3>
                    ${renderPosterRow(d.top_tvshows, 'poster_path')}
                </div>
            `;
        }

        if (d.top_anime && d.top_anime.length > 0) {
            html += `
                <div class="profile-section">
                    <h3>Top Rated Anime</h3>
                    ${renderPosterRow(d.top_anime, 'poster_url')}
                </div>
            `;
        }

        html += `
            <div class="profile-cta">
                <p>Track your movies, TV shows & anime. Get recommendations powered by the community.</p>
                <a href="/login">Join WatchWise</a>
            </div>
        `;

        document.getElementById('profileContent').innerHTML = html;
    }

    loadProfile();
    </script>
</body>
</html>
