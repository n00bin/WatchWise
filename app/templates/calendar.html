{% extends "base.html" %}
{% block title_suffix %} - Calendar{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Upcoming Episodes</h1>
    <button class="btn btn-secondary" onclick="loadPageData()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        Refresh
    </button>
</div>

<div id="calendarContent">
    <div class="loading-center"><div class="spinner"></div></div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadPageData() {
    document.getElementById('calendarContent').innerHTML = `
        <div class="loading-center" style="flex-direction:column;gap:12px">
            <div class="spinner"></div>
            <p style="color:var(--text-muted);font-size:0.82rem">Checking for upcoming episodes...</p>
        </div>
    `;

    try {
        const data = await api('/api/calendar');
        renderCalendar(data);
    } catch (err) {
        document.getElementById('calendarContent').innerHTML = `
            <div class="empty-state">
                <h3>Couldn't load calendar</h3>
                <p>${err.message}</p>
                <button class="btn btn-primary" onclick="loadPageData()">Try Again</button>
            </div>
        `;
    }
}

function renderCalendar(data) {
    const container = document.getElementById('calendarContent');
    const upcoming = data.upcoming;

    if (data.watching_count === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <h3>No shows being watched</h3>
                <p>Add TV shows and set them to "Watching" to see upcoming episodes here.</p>
                <a href="/tvshows" class="btn btn-primary">Go to TV Shows</a>
            </div>
        `;
        return;
    }

    if (upcoming.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <h3>No upcoming episodes</h3>
                <p>None of your ${data.watching_count} shows have announced upcoming episodes yet.</p>
            </div>
        `;
        return;
    }

    // Group by date
    const groups = {};
    const today = new Date().toISOString().split('T')[0];
    const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];

    for (const ep of upcoming) {
        let dateLabel;
        if (!ep.air_date) {
            dateLabel = 'TBA';
        } else if (ep.air_date === today) {
            dateLabel = 'Today';
        } else if (ep.air_date === tomorrow) {
            dateLabel = 'Tomorrow';
        } else {
            const d = new Date(ep.air_date + 'T00:00:00');
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            dateLabel = `${dayNames[d.getDay()]}, ${monthNames[d.getMonth()]} ${d.getDate()}`;

            // Add relative info
            const diffDays = Math.ceil((d - new Date(today + 'T00:00:00')) / 86400000);
            if (diffDays > 0 && diffDays <= 7) {
                dateLabel += ` (in ${diffDays} day${diffDays > 1 ? 's' : ''})`;
            } else if (diffDays < 0) {
                dateLabel += ' (aired)';
            }
        }

        if (!groups[dateLabel]) groups[dateLabel] = [];
        groups[dateLabel].push(ep);
    }

    let html = '';
    for (const [dateLabel, episodes] of Object.entries(groups)) {
        const isToday = dateLabel === 'Today';
        html += `
            <div class="calendar-group" style="margin-bottom:24px">
                <h3 style="font-size:0.9rem;color:${isToday ? 'var(--primary-light)' : 'var(--text-muted)'};margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">
                    ${isToday ? '<span style="display:inline-block;width:8px;height:8px;background:var(--primary);border-radius:50%;margin-right:8px"></span>' : ''}${dateLabel}
                </h3>
                ${episodes.map(ep => `
                    <div class="calendar-episode" style="display:flex;gap:14px;align-items:center;padding:12px;background:var(--card);border-radius:10px;margin-bottom:8px;border:1px solid var(--border)">
                        <div style="width:50px;height:75px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--bg)">
                            ${ep.poster_path ? `<img src="${ep.poster_path}" alt="" style="width:100%;height:100%;object-fit:cover">` : ''}
                        </div>
                        <div style="flex:1;min-width:0">
                            <div style="font-weight:600;font-size:0.9rem;color:var(--text)">${escapeHtml(ep.show_title)}</div>
                            <div style="font-size:0.82rem;color:var(--primary-light);margin-top:2px">
                                S${String(ep.season).padStart(2,'0')}E${String(ep.episode).padStart(2,'0')}
                                ${ep.episode_name && ep.episode_name !== 'Waiting for new episodes' ? ' — ' + escapeHtml(ep.episode_name) : ''}
                            </div>
                            ${ep.overview ? `<div style="font-size:0.78rem;color:var(--text-muted);margin-top:4px;line-height:1.4">${escapeHtml(ep.overview)}</div>` : ''}
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    container.innerHTML = html;
}

loadPageData();
</script>
{% endblock %}
