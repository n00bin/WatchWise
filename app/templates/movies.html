{% extends "base.html" %}
{% block title_suffix %} - Movies{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Movies</h1>
    <button class="btn btn-primary" onclick="openSearchModal('movie', 'Add a Movie')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Add Movie
    </button>
</div>

<div class="tab-bar" id="filterTabs">
    <button class="tab-btn active" data-status="" onclick="filterMovies('')">All</button>
    <button class="tab-btn" data-status="watchlist" onclick="filterMovies('watchlist')">Watchlist</button>
    <button class="tab-btn" data-status="watching" onclick="filterMovies('watching')">Watching</button>
    <button class="tab-btn" data-status="watched" onclick="filterMovies('watched')">Watched</button>
    <button class="tab-btn" data-status="dropped" onclick="filterMovies('dropped')">Dropped</button>
</div>

<div class="media-grid" id="movieGrid">
    <div class="loading-center" style="grid-column:1/-1"><div class="spinner"></div></div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allMovies = [];
let currentFilter = '';

async function loadPageData() {
    try {
        allMovies = await api('/api/movies');
        renderMovies();
    } catch (err) {
        document.getElementById('movieGrid').innerHTML = `<p class="search-hint" style="grid-column:1/-1;color:var(--danger)">Error loading movies: ${err.message}</p>`;
    }
}

function filterMovies(status) {
    currentFilter = status;
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.status === status);
    });
    renderMovies();
}

function renderMovies() {
    const filtered = currentFilter
        ? allMovies.filter(m => m.status === currentFilter)
        : allMovies;

    const grid = document.getElementById('movieGrid');

    if (filtered.length === 0) {
        grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
                    <line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                </svg>
                <h3>${currentFilter ? 'No movies in this category' : 'No movies yet'}</h3>
                <p>Search and add movies to start tracking your watches.</p>
                <button class="btn btn-primary" onclick="openSearchModal('movie', 'Add a Movie')">Add Your First Movie</button>
            </div>
        `;
        return;
    }

    grid.innerHTML = filtered.map(m => renderMediaCard(m, 'movie')).join('');
}

loadPageData();
</script>
{% endblock %}
